services:
  job-service:
    build:
      context: ../..
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app:/app/client/src
      SERVICE_NAME: job-service
      SERVICE_VERSION: 0.1.0
      JOB_SERVICE_URL: http://job-service:8001
      STORE_API_URL: ${STORE_API_URL:-http://host.docker.internal:8000}
      INNGEST_DEV: 1
      INNGEST_BASE_URL: ${INNGEST_BASE_URL:-http://inngest:8288}
      INNGEST_PUBLIC_URL: ${INNGEST_PUBLIC_URL:-http://localhost:8288}
    volumes:
      - ../../:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - job-service-network

  inngest:
    image: inngest/inngest:latest
    command: inngest dev
    ports:
      - "8288:8288"
      - "8289:8289"
    restart: unless-stopped
    networks:
      - job-service-network

networks:
  job-service-network:
    name: job-service-network
    external: true
