name: Deploy

on:
  push:
    branches:
      - develop
      - production

  workflow_dispatch:
    inputs:
      user:
        description: "Deploy user suffix (e.g. aserrano)"
        required: true
      stage:
        description: "Target stage"
        required: true
        default: "local"
        type: choice
        options:
          - local

env:
  SERVICE_NAME: job-service
  ECS_SERVICE_LOOKUP: JobService
  DOCKERFILE: Dockerfile
  CONTAINER_PORT: "8001"

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: read
      id-token: write

    env:
      STAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.stage || github.ref_name == 'production' && 'production' || github.ref_name == 'develop' && 'dev' || '' }}
      STACK_PREFIX: ${{ github.event_name == 'workflow_dispatch' && format('platform-stack-{0}-{1}', inputs.stage, inputs.user) || github.ref_name == 'production' && 'platform-stack-production' || github.ref_name == 'develop' && 'platform-stack-dev' || '' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ROLE_ARN: ${{ github.event_name != 'workflow_dispatch' && github.ref_name == 'production' && secrets.AWS_ROLE_PRODUCTION_ARN || secrets.AWS_ROLE_DEV_ARN }}
      SHOULD_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && 'true' || github.ref_name == 'production' && vars.DEPLOY_PROD == 'true' && 'true' || github.ref_name == 'develop' && vars.DEPLOY_DEV == 'true' && 'true' || 'false' }}
      DEPLOY_FLAG_NAME: ${{ github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || github.ref_name == 'production' && 'DEPLOY_PROD' || github.ref_name == 'develop' && 'DEPLOY_DEV' || 'unknown' }}

    steps:
      - uses: actions/checkout@v4
        if: env.SHOULD_DEPLOY == 'true'

      - uses: aws-actions/configure-aws-credentials@v4
        if: env.SHOULD_DEPLOY == 'true'
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        shell: bash
        run: |
          if [ "${SHOULD_DEPLOY}" != "true" ]; then
            echo "Bypass deploy for ${{ github.ref_name }} because ${DEPLOY_FLAG_NAME} is not true."
            exit 0
          fi

          if [ -z "${STACK_PREFIX}" ] || [ -z "${STAGE}" ]; then
            echo "Unsupported ref: ${{ github.ref_name }}"
            exit 1
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"

          IMAGE_TAG="${{ github.sha }}"
          ECR_REPO="${STACK_PREFIX}/${SERVICE_NAME}"
          FULL_IMAGE="${REGISTRY}/${ECR_REPO}"
          docker build -t "${FULL_IMAGE}:${IMAGE_TAG}" -t "${FULL_IMAGE}:latest" -f ${{ env.DOCKERFILE }} .
          docker push "${FULL_IMAGE}:${IMAGE_TAG}"
          docker push "${FULL_IMAGE}:latest"
 
          ECS_CLUSTER="${STACK_PREFIX}-cluster"
          ECS_SERVICE=$(aws ecs list-services --cluster "${ECS_CLUSTER}" --query "serviceArns[?contains(@, '${ECS_SERVICE_LOOKUP}')]" --output text | head -1 | xargs -I{} basename {})
          if [ -z "$ECS_SERVICE" ]; then
            echo "ECS service not found — image-only deploy (first run)"
            exit 0
          fi

          aws ecs update-service --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE}" --force-new-deployment --desired-count 1
          aws ecs wait services-stable --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}"
