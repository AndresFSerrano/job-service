name: Deploy

on:
  push:
    branches:
      - develop
      - production

  workflow_dispatch:
    inputs:
      user:
        description: "Deploy user suffix (e.g. aserrano)"
        required: true
      stage:
        description: "Target stage"
        required: true
        default: "local"
        type: choice
        options:
          - local

env:
  SERVICE_NAME: job-service
  ECS_SERVICE_LOOKUP: JobService
  DOCKERFILE: Dockerfile
  CONTAINER_PORT: "8001"

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      deploy_flag_name: ${{ steps.resolve.outputs.deploy_flag_name }}
      stage: ${{ steps.resolve.outputs.stage }}
      stack_prefix: ${{ steps.resolve.outputs.stack_prefix }}
      aws_region: ${{ steps.resolve.outputs.aws_region }}
      role_arn: ${{ steps.resolve.outputs.role_arn }}

    steps:
      - name: Resolve environment
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STAGE="${{ inputs.stage }}"
            DEPLOY_USER="${{ inputs.user }}"
            STACK_PREFIX="platform-stack-${STAGE}-${DEPLOY_USER}"
            SHOULD_DEPLOY="true"
            DEPLOY_FLAG_NAME="workflow_dispatch"
          elif [ "${{ github.ref_name }}" = "production" ]; then
            STAGE="production"
            STACK_PREFIX="platform-stack-${STAGE}"
            DEPLOY_ENABLED="${{ vars.DEPLOY_PROD }}"
            DEPLOY_FLAG_NAME="DEPLOY_PROD"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            STAGE="dev"
            STACK_PREFIX="platform-stack-${STAGE}"
            DEPLOY_ENABLED="${{ vars.DEPLOY_DEV }}"
            DEPLOY_FLAG_NAME="DEPLOY_DEV"
          else
            echo "Unsupported ref: ${{ github.ref_name }}"
            exit 1
          fi

          if [ "$STAGE" = "production" ]; then
            ROLE_ARN="${{ secrets.AWS_ROLE_PRODUCTION_ARN }}"
          else
            ROLE_ARN="${{ secrets.AWS_ROLE_DEV_ARN }}"
          fi

          if [ -z "$ROLE_ARN" ]; then
            echo "Missing AWS role secret for stage=$STAGE"
            exit 1
          fi

          AWS_REGION="${{ vars.AWS_REGION }}"
          AWS_REGION="${AWS_REGION:-us-east-1}"

          if [ -z "$SHOULD_DEPLOY" ]; then
            SHOULD_DEPLOY="false"
            if [ "${DEPLOY_ENABLED,,}" = "true" ]; then
              SHOULD_DEPLOY="true"
            fi
          fi

          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"
          echo "deploy_flag_name=$DEPLOY_FLAG_NAME" >> "$GITHUB_OUTPUT"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "stack_prefix=$STACK_PREFIX" >> "$GITHUB_OUTPUT"
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_deploy == 'true' }}
    concurrency:
      group: deploy-${{ needs.prepare.outputs.stack_prefix }}
      cancel-in-progress: false

    permissions:
      contents: read
      id-token: write

    env:
      STAGE: ${{ needs.prepare.outputs.stage }}
      STACK_PREFIX: ${{ needs.prepare.outputs.stack_prefix }}
      AWS_REGION: ${{ needs.prepare.outputs.aws_region }}
      AWS_ROLE_ARN: ${{ needs.prepare.outputs.role_arn }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ECR_REPO="${STACK_PREFIX}/${SERVICE_NAME}"
          FULL_IMAGE="${REGISTRY}/${ECR_REPO}"
          docker build -t "${FULL_IMAGE}:${IMAGE_TAG}" -t "${FULL_IMAGE}:latest" -f ${{ env.DOCKERFILE }} .
          docker push "${FULL_IMAGE}:${IMAGE_TAG}"
          docker push "${FULL_IMAGE}:latest"

      - name: Resolve ECS service name
        run: |
          ECS_CLUSTER="${STACK_PREFIX}-cluster"
          echo "ECS_CLUSTER=$ECS_CLUSTER" >> "$GITHUB_ENV"
          ECS_SERVICE=$(aws ecs list-services --cluster "${ECS_CLUSTER}" --query "serviceArns[?contains(@, '${ECS_SERVICE_LOOKUP}')]" --output text | head -1 | xargs -I{} basename {})
          if [ -z "$ECS_SERVICE" ]; then
            echo "ECS service not found — image-only deploy (first run)"
            echo "ECS_SERVICE=" >> "$GITHUB_ENV"
          else
            echo "ECS_SERVICE=$ECS_SERVICE" >> "$GITHUB_ENV"
          fi

      - name: Update ECS service
        if: env.ECS_SERVICE != ''
        run: |
          aws ecs update-service --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE}" --force-new-deployment --desired-count 1
          aws ecs wait services-stable --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}"

  skip-deploy:
    name: skip deploy
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_deploy != 'true' }}
    steps:
      - name: Report bypass
        run: echo "Bypass deploy for ${{ github.ref_name }} because ${{ needs.prepare.outputs.deploy_flag_name }} is not true."
